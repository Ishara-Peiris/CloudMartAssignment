apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: product-service
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      serviceAccountName: product-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: product-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8001
          env:
            - name: DYNAMODB_TABLE
              valueFrom:
                configMapKeyRef:
                  name: product-service-config
                  key: dynamodbTableName
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: product-service-config
                  key: awsRegion
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
  strategy:
    canary:
      steps:
        - setWeight: 20
        - pause: { duration: 2m }
        - setWeight: 50
        - pause: { duration: 2m }
        - setWeight: 100
      analysis:
        templates:
          - templateName: product-error-rate
        startingStep: 1
        args:
          - name: service-name
            value: product-service
---
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: product-error-rate
  namespace: {{ .Values.namespace }}
spec:
  args:
    - name: service-name
  metrics:
    - name: error-rate
      interval: 1m
      failureLimit: 1
      provider:
        cloudWatch:
          interval: 1m
          metricDataQueries:
            - id: errors
              metricStat:
                metric:
                  namespace: CloudMart/Services
                  metricName: 5xxErrorRate
                  dimensions:
                    - name: Service
                      value: "{{args.service-name}}"
                period: 60
                stat: Average
      successCondition: result[0] <= 1   # Halt if error rate > 1%

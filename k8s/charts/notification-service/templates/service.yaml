# notification-service has no inbound traffic, but creating a dummy service to satisfy requirements if needed
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: {{ .Values.namespace }}
  labels:
    app: notification-service
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: dummy
  selector:
    app: notification-service
